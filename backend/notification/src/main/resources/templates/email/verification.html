<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이메일 인증</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Apple SD Gothic Neo',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding:40px 16px;">
            <table width="480" cellpadding="0" cellspacing="0"
                   style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">

                <!-- 헤더 -->
                <tr>
                    <td style="background:#212121;padding:28px 32px;">
                        <span style="color:#ffffff;font-size:20px;font-weight:700;" th:text="${appName}">mkyou</span>
                    </td>
                </tr>

                <!-- 본문 -->
                <tr>
                    <td style="padding:36px 32px;">
                        <p style="margin:0 0 8px;font-size:16px;color:#111111;font-weight:600;">
                            이메일 인증 코드
                        </p>
                        <p style="margin:0 0 28px;font-size:14px;color:#6b7280;line-height:1.6;">
                            아래 인증 코드를 입력창에 입력해 주세요.<br/>
                            코드는 <strong th:text="${expireMinutes}">5</strong>분 후 만료됩니다.
                        </p>

                        <!-- 인증 코드 박스 -->
                        <div style="background:#f4f4f5;border-radius:8px;padding:20px;text-align:center;margin-bottom:28px;">
                <span th:text="${code}"
                      style="font-size:36px;font-weight:700;letter-spacing:12px;color:#212121;font-family:monospace;">
                  000000
                </span>
                        </div>

                        <p style="margin:0;font-size:12px;color:#9ca3af;line-height:1.6;">
                            본인이 요청하지 않은 경우 이 메일을 무시해 주세요.<br/>
                            계정 보안을 위해 코드를 타인과 공유하지 마세요.
                        </p>
                    </td>
                </tr>

                <!-- 푸터 -->
                <tr>
                    <td style="background:#f9fafb;padding:16px 32px;border-top:1px solid #e5e7eb;">
                        <p style="margin:0;font-size:12px;color:#9ca3af;">
                            &copy; 2026 <span th:text="${appName}">mkyou</span>. All rights reserved.
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
