server:
  port: 8082

spring:
  application:
    name: notification

  datasource:
    url: jdbc:postgresql://localhost:5432/daramu
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

notification:
  mail:
    from: ${MAIL_USERNAME}
    from-name: "daramu"
  verification:
    expire-minutes: 5 # 인증코드 유효시간 (분)
    cleanup-minutes: 30 # 만료 레코드 정리 주기 (분)
